<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9d5bf0" />
      <stop offset="100%" stop-color="#625df5" />
    </linearGradient>
  </defs>
  
  <!-- Rounded White Background -->
  <rect x="0" y="0" width="100" height="100" rx="25" fill="#ffffff" />
  
  <g transform="translate(-10, -10) scale(1.2)">
    <!-- Ears/Antennae -->
    <rect x="33" y="16" width="10" height="22" rx="5" fill="#9d5bf0" />
    <rect x="57" y="16" width="10" height="22" rx="5" fill="#9d5bf0" />
    
    <!-- Body -->
    <rect x="25" y="32" width="50" height="48" rx="18" fill="url(#robotGrad)" />
    
    <!-- Face/Screen -->
    <rect x="32" y="40" width="36" height="24" rx="8" fill="#1a1a1a" />
    
    <!-- Left Eye (Dot) -->
    <circle cx="43" cy="52" r="3" fill="white" />
    
    <!-- Right Eye (Wink) -->
    <path d="M53,54 Q57,47 61,54" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  </g>
</svg>